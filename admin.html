<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnSmart Admin Panel</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="favicon/apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-mode.active {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            transform: scale(1.02);
        }
    </style>
</head>

<body class="bg-[#050505] text-white min-h-screen flex items-center justify-center p-4">

    <!-- Login Overlay -->
    <div id="loginOverlay" class="fixed inset-0 bg-[#050505] z-50 flex items-center justify-center p-6">
        <div class="glass p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <div class="text-center mb-8">
                <div
                    class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/20">
                    <span class="text-2xl">🔒</span>
                </div>
                <h1 class="text-2xl font-bold">Admin Portal</h1>
                <p class="text-gray-400 mt-2">Secure access required</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="adminPass" placeholder="Enter Password"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white transition-all">
                <button onclick="checkAccess()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-xl transition-all duration-300 shadow-lg shadow-blue-500/20 active:scale-95">
                    Access Dashboard
                </button>
                <p id="errorMsg" class="text-red-400 text-sm text-center hidden">Incorrect password. Please try again.
                </p>
            </div>
        </div>
    </div>

    <!-- Admin Content -->
    <div id="adminContent" class="hidden w-full max-w-xl">
        <div class="glass rounded-3xl overflow-hidden shadow-2xl border border-white/10">
            <!-- Header -->
            <div class="bg-gradient-to-br from-blue-600 to-indigo-800 p-8">
                <h1 class="text-3xl font-extrabold">Control Center</h1>
                <p class="text-blue-100/80 mt-1">Manage audio sets and landing page links</p>
            </div>

            <div class="p-8 space-y-10">
                <!-- Mode Selection -->
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-[0.2em] mb-4">Select Active
                        Mode</label>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="setMode('whatsapp')" id="btnWhatsapp"
                            class="btn-mode group flex flex-col items-center justify-center p-6 rounded-2xl border-2 border-white/5 hover:border-white/20 transition-all duration-300">
                            <div
                                class="w-12 h-12 bg-green-500/10 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                                <span class="text-2xl">📱</span>
                            </div>
                            <span class="font-bold text-lg">WhatsApp</span>
                        </button>
                        <button onclick="setMode('telegram')" id="btnTelegram"
                            class="btn-mode group flex flex-col items-center justify-center p-6 rounded-2xl border-2 border-white/5 hover:border-white/20 transition-all duration-300">
                            <div
                                class="w-12 h-12 bg-blue-500/10 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                                <span class="text-2xl">✈️</span>
                            </div>
                            <span class="font-bold text-lg">Telegram</span>
                        </button>
                    </div>
                </div>

                <!-- CTA Link Management -->
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-[0.2em] mb-4">CTA Button
                        Configuration</label>

                    <!-- CTA Type Selector -->
                    <div class="flex p-1 bg-white/5 rounded-xl mb-4 border border-white/10">
                        <button onclick="setCtaType('whatsapp')" id="ctaTypeWhatsapp"
                            class="flex-1 py-2 text-xs font-bold rounded-lg transition-all duration-300">WhatsApp</button>
                        <button onclick="setCtaType('telegram')" id="ctaTypeTelegram"
                            class="flex-1 py-2 text-xs font-bold rounded-lg transition-all duration-300">Telegram</button>
                        <button onclick="setCtaType('custom')" id="ctaTypeCustom"
                            class="flex-1 py-2 text-xs font-bold rounded-lg transition-all duration-300">Custom
                            Link</button>
                    </div>

                    <!-- WhatsApp Input -->
                    <div id="waInputGroup" class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                            <span class="text-gray-500 font-medium">+91</span>
                        </div>
                        <input type="text" id="waNumberInput" placeholder="8828695070"
                            class="w-full bg-white/5 border border-white/10 rounded-xl pl-14 pr-5 py-4 focus:outline-none focus:ring-2 focus:ring-green-500/50 text-white transition-all placeholder:text-gray-700">
                    </div>

                    <!-- Telegram Input -->
                    <div id="tgInputGroup" class="hidden relative group">
                        <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                            <span class="text-gray-500 font-medium">@</span>
                        </div>
                        <input type="text" id="tgUsernameInput" placeholder="username"
                            class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-white transition-all placeholder:text-gray-700">
                    </div>

                    <!-- Custom Input -->
                    <div id="customInputGroup" class="hidden">
                        <input type="text" id="ctaLinkInput" placeholder="https://..."
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-purple-500/50 text-white transition-all placeholder:text-gray-700">
                    </div>

                    <p class="text-[10px] text-gray-500 mt-2 px-1" id="ctaPreview">Preview: https://wa.me/+91...</p>
                </div>

                <!-- GitHub Settings (Discreet) -->
                <div class="border-t border-white/5 pt-6 opacity-30 hover:opacity-100 transition-opacity">
                    <button onclick="toggleGithubConfig()"
                        class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                        ⚙️ Integration Settings <span id="ghToggleIcon">▼</span>
                    </button>
                    <div id="githubConfig" class="hidden space-y-3">
                        <input type="password" id="ghToken" placeholder="GitHub Token"
                            class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="ghOwner" placeholder="Username"
                                class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-xs">
                            <input type="text" id="ghRepo" placeholder="Repo"
                                class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-xs">
                        </div>
                    </div>
                </div>


                <!-- Action Button -->
                <div class="pt-4">
                    <button id="saveBtn" onclick="saveChanges()"
                        class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(59,130,246,0.2)] hover:bg-blue-500 transition-all duration-300 transform active:scale-95 flex items-center justify-center gap-2">
                        <span id="saveLoading" class="hidden animate-spin">⌛</span>
                        <span id="saveIcon">⚡</span>
                        <span id="saveText">Save to Live Website</span>
                    </button>
                </div>

                <!-- Status Feedback -->
                <div id="statusMsg" class="hidden text-center text-sm font-medium py-2 rounded-xl"></div>

                <!-- Export Panel (Keep for fallback) -->
                <div id="savePanel" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="p-6 bg-blue-600/10 rounded-2xl border border-blue-500/20 text-center">
                        <p class="text-xs text-blue-300 mb-4 opacity-70">Automatic update failed? Download manually:</p>
                        <button onclick="downloadJSON()"
                            class="w-full bg-white/5 hover:bg-white/10 text-white font-semibold py-3.5 rounded-xl flex items-center justify-center gap-2 transition-all">
                            <span>📥</span> Download settings.json
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <p class="text-center text-gray-500 text-xs mt-8 uppercase tracking-widest">Powered by EarnSmart Admin v3.0</p>
    </div>

    <script>
        let config = {
            mode: 'whatsapp',
            ctaLink: '',
            ctaType: 'whatsapp', // Default type
            ctaValue: ''         // Just the number or username
        };

        // Load existing settings
        fetch('settings.json')
            .then(res => res.json())
            .then(data => {
                config = data;
                updateUI(data.mode);

                // Set CTA UI based on saved config or detect from link
                if (data.ctaType) {
                    setCtaType(data.ctaType);
                    const id = data.ctaType === 'whatsapp' ? 'waNumberInput' :
                        data.ctaType === 'telegram' ? 'tgUsernameInput' : 'ctaLinkInput';
                    const el = document.getElementById(id);
                    if (el) el.value = data.ctaValue || '';
                } else {
                    // Fallback: Detect type from link string
                    detectAndSetCta(data.ctaLink);
                }
                updateCtaPreview();
            })
            .catch(e => {
                console.log("New setup detected");
                setCtaType('whatsapp'); // Default for new setup
            });

        function detectAndSetCta(link) {
            if (!link) {
                setCtaType('whatsapp');
                return;
            }
            if (link.includes('wa.me')) {
                setCtaType('whatsapp');
                const val = link.split('+91')[1] || link.split('wa.me/')[1] || '';
                document.getElementById('waNumberInput').value = val;
            } else if (link.includes('t.me')) {
                setCtaType('telegram');
                const val = link.split('t.me/')[1] || '';
                document.getElementById('tgUsernameInput').value = val;
            } else {
                setCtaType('custom');
                document.getElementById('ctaLinkInput').value = link;
            }
        }

        // Fully Automated Config: Load from local storage
        function getGHConfig() {
            return {
                token: localStorage.getItem('gh_token') || '',
                owner: localStorage.getItem('gh_owner') || 'ARSH090',
                repo: localStorage.getItem('gh_repo') || 'MASIHA-WERBSITE-WORK'
            };
        }

        // Initialize fields
        const saved = getGHConfig();
        document.getElementById('ghToken').value = saved.token;
        document.getElementById('ghOwner').value = saved.owner;
        document.getElementById('ghRepo').value = saved.repo;

        function toggleGithubConfig() {
            const el = document.getElementById('githubConfig');
            const icon = document.getElementById('ghToggleIcon');
            const isHidden = el.classList.contains('hidden');
            el.classList.toggle('hidden');
            icon.textContent = isHidden ? '▲' : '▼';
        }


        function checkAccess() {
            const pass = document.getElementById('adminPass').value.trim();
            if (pass.toLowerCase() === 'arsh12145') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminContent').classList.remove('hidden');
            } else {
                showStatus('Incorrect password!', 'red');
            }
        }

        function setMode(m) {
            config.mode = m;
            updateUI(m);
        }

        function setCtaType(type) {
            config.ctaType = type;

            // UI Toggle
            const types = ['whatsapp', 'telegram', 'custom'];
            types.forEach(t => {
                const btn = document.getElementById('ctaType' + t.charAt(0).toUpperCase() + t.slice(1).toLowerCase());
                const group = document.getElementById(t + (t === 'custom' ? '' : 'Input') + 'Group');

                if (t === type) {
                    btn.classList.add('bg-blue-600', 'text-white');
                    btn.classList.remove('text-gray-400');
                    group.classList.remove('hidden');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('text-gray-400');
                    group.classList.add('hidden');
                }
            });
            updateCtaPreview();
        }

        function updateCtaPreview() {
            const preview = document.getElementById('ctaPreview');
            let finalLink = "";

            if (config.ctaType === 'whatsapp') {
                const val = document.getElementById('waNumberInput').value.trim();
                finalLink = val ? `https://wa.me/+91${val}` : "https://wa.me/+91...";
            } else if (config.ctaType === 'telegram') {
                const val = document.getElementById('tgUsernameInput').value.trim();
                finalLink = val ? `https://t.me/${val.replace('@', '')}` : "https://t.me/username";
            } else {
                finalLink = document.getElementById('ctaLinkInput').value.trim() || "https://...";
            }

            preview.textContent = "Preview: " + finalLink;
            return finalLink;
        }

        // Add real-time preview listeners
        ['waNumberInput', 'tgUsernameInput', 'ctaLinkInput'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateCtaPreview);
        });

        function updateUI(m) {
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            if (m === 'whatsapp') {
                document.getElementById('btnWhatsapp').classList.add('active');
            } else {
                document.getElementById('btnTelegram').classList.add('active');
            }
        }

        async function saveChanges() {
            const btn = document.getElementById('saveBtn');
            const text = document.getElementById('saveText');
            const loader = document.getElementById('saveLoading');
            const icon = document.getElementById('saveIcon');

            // UI State: Loading
            btn.disabled = true;
            loader.classList.remove('hidden');
            icon.classList.add('hidden');
            text.textContent = 'Pushing to GitHub...';

            // Build final link
            const finalLink = updateCtaPreview();
            config.ctaLink = finalLink;

            // Store parts for admin re-edit
            config.ctaValue = (config.ctaType === 'whatsapp') ? document.getElementById('waNumberInput').value :
                (config.ctaType === 'telegram') ? document.getElementById('tgUsernameInput').value :
                    document.getElementById('ctaLinkInput').value;

            // Fetch current settings
            const gh = {
                token: document.getElementById('ghToken').value,
                owner: document.getElementById('ghOwner').value,
                repo: document.getElementById('ghRepo').value
            };

            // Save for next time (browser remembers it)
            localStorage.setItem('gh_token', gh.token);
            localStorage.setItem('gh_owner', gh.owner);
            localStorage.setItem('gh_repo', gh.repo);

            if (!gh.token) {
                showStatus('Missing token! Paste it in Settings below.', 'yellow');
                document.getElementById('githubConfig').classList.remove('hidden');
                resetBtn();
                return;
            }

            try {
                // 1. Get current file SHA (required for GitHub update)
                const fileUrl = `https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/settings.json`;
                const getRes = await fetch(fileUrl, {
                    headers: { 'Authorization': `token ${gh.token}` }
                });

                let sha = null;
                if (getRes.ok) {
                    const fileData = await getRes.json();
                    sha = fileData.sha;
                } else if (getRes.status !== 404) {
                    throw new Error('Connection failed. Check your token permissions.');
                }

                // 2. Update or Create file
                const content = btoa(JSON.stringify(config, null, 2));
                const payload = {
                    message: `Update site settings: ${config.mode}`,
                    content: content
                };
                if (sha) payload.sha = sha;

                const putRes = await fetch(fileUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${gh.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (putRes.ok) {
                    showStatus('✅ Successfully updated live site!', 'green');
                } else {
                    const err = await putRes.json();
                    throw new Error(err.message || 'GitHub update failed');
                }
            } catch (err) {
                console.error(err);
                showStatus(`❌ Error: ${err.message}`, 'red');
                document.getElementById('savePanel').classList.remove('hidden');
            } finally {
                resetBtn();
            }
        }

        function resetBtn() {
            const btn = document.getElementById('saveBtn');
            const text = document.getElementById('saveText');
            const loader = document.getElementById('saveLoading');
            const icon = document.getElementById('saveIcon');
            btn.disabled = false;
            loader.classList.add('hidden');
            icon.classList.remove('hidden');
            text.textContent = 'Save to Live Website';
        }

        function showStatus(msg, color) {
            const el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.className = `block text-center text-sm font-medium py-3 px-4 rounded-xl animate-in fade-in duration-300 mb-4`;

            if (color === 'red') el.classList.add('bg-red-500/10', 'text-red-400', 'border', 'border-red-500/20');
            if (color === 'green') el.classList.add('bg-green-500/10', 'text-green-400', 'border', 'border-green-500/20');
            if (color === 'yellow') el.classList.add('bg-yellow-500/10', 'text-yellow-400', 'border', 'border-yellow-500/20');

            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        function downloadJSON() {
            config.ctaLink = document.getElementById('ctaLinkInput').value;
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(config, null, 2));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", "settings.json");
            document.body.appendChild(dlAnchor);
            dlAnchor.click();
            dlAnchor.remove();
        }

        document.getElementById('adminPass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAccess();
        });
    </script>
</body>

</html>
